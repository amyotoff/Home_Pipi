# Development overrides for Raspberry Pi local development
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Raspberry Pi 4/5 with ≥ 4 GB RAM recommended

services:
  pipi-bot:
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - /var/run/dbus:/var/run/dbus
      - /run/udev:/run/udev:ro
      # Docker socket NOT mounted — use docker CLI from host if needed
    environment:
      - NODE_ENV=development
      - TZ=${TZ:-UTC}
    command: npm run dev
    ports: !reset []
    read_only: false
    security_opt: !reset
      - seccomp:unconfined

  ollama:
    network_mode: host
    ports: !reset []

  chromium:
    security_opt: !reset
      - seccomp:unconfined
    ports:
      - "127.0.0.1:9222:9222"

